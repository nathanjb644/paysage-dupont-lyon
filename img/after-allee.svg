<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450">
  <defs>
    <linearGradient id="sky-clear" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7EB8DA"/>
      <stop offset="100%" stop-color="#B8D8E8"/>
    </linearGradient>
    <linearGradient id="lawn-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B9E50"/>
      <stop offset="100%" stop-color="#5A8A42"/>
    </linearGradient>
    <linearGradient id="hedge-trim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A7A38"/>
      <stop offset="100%" stop-color="#3D6B2E"/>
    </linearGradient>
    <linearGradient id="pave" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C4B8A0"/>
      <stop offset="100%" stop-color="#B8AA90"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="600" height="120" fill="url(#sky-clear)"/>
  <circle cx="100" cy="55" r="26" fill="#F5E6A0" opacity="0.65"/>

  <!-- Trimmed hedges left -->
  <g fill="url(#hedge-trim)">
    <ellipse cx="30" cy="145" rx="40" ry="30"/>
    <ellipse cx="65" cy="143" rx="35" ry="32"/>
    <ellipse cx="100" cy="145" rx="33" ry="28"/>
    <ellipse cx="15" cy="138" rx="25" ry="22"/>
    <ellipse cx="50" cy="132" rx="28" ry="20"/>
    <ellipse cx="85" cy="134" rx="25" ry="18"/>
  </g>

  <!-- Trimmed hedges right -->
  <g fill="url(#hedge-trim)">
    <ellipse cx="570" cy="145" rx="40" ry="30"/>
    <ellipse cx="535" cy="143" rx="35" ry="32"/>
    <ellipse cx="500" cy="145" rx="33" ry="28"/>
    <ellipse cx="585" cy="138" rx="25" ry="22"/>
    <ellipse cx="550" cy="132" rx="28" ry="20"/>
    <ellipse cx="515" cy="134" rx="25" ry="18"/>
  </g>

  <!-- Hedge base strip -->
  <rect y="115" width="600" height="45" fill="url(#hedge-trim)" opacity="0.3"/>

  <!-- Green lawn -->
  <rect y="160" width="600" height="290" fill="url(#lawn-green)"/>

  <!-- Lawn texture -->
  <g fill="#7DB060" opacity="0.35">
    <ellipse cx="100" cy="220" rx="80" ry="30"/>
    <ellipse cx="500" cy="220" rx="80" ry="30"/>
    <ellipse cx="100" cy="320" rx="70" ry="25"/>
    <ellipse cx="500" cy="320" rx="70" ry="25"/>
  </g>

  <!-- Stone paved path -->
  <path d="M210 160 Q218 220 225 270 Q230 310 235 350 Q238 390 240 450 L360 450 Q362 390 365 350 Q370 310 375 270 Q382 220 390 160Z" fill="url(#pave)" opacity="0.85"/>

  <!-- Paving stones -->
  <g fill="#B8AA90" stroke="#A09880" stroke-width="0.4" opacity="0.85">
    <rect x="225" y="170" width="55" height="28" rx="2"/>
    <rect x="285" y="170" width="55" height="28" rx="2"/>
    <rect x="230" y="203" width="52" height="28" rx="2"/>
    <rect x="287" y="203" width="50" height="28" rx="2"/>
    <rect x="234" y="236" width="50" height="28" rx="2"/>
    <rect x="289" y="236" width="48" height="28" rx="2"/>
    <rect x="237" y="269" width="48" height="28" rx="2"/>
    <rect x="290" y="269" width="46" height="28" rx="2"/>
    <rect x="239" y="302" width="46" height="28" rx="2"/>
    <rect x="290" y="302" width="44" height="28" rx="2"/>
    <rect x="241" y="335" width="44" height="28" rx="2"/>
    <rect x="290" y="335" width="42" height="28" rx="2"/>
    <rect x="243" y="368" width="42" height="28" rx="2"/>
    <rect x="290" y="368" width="40" height="28" rx="2"/>
    <rect x="244" y="401" width="40" height="28" rx="2"/>
    <rect x="290" y="401" width="38" height="28" rx="2"/>
    <rect x="245" y="434" width="38" height="16" rx="2"/>
    <rect x="290" y="434" width="36" height="16" rx="2"/>
  </g>

  <!-- Path border stones -->
  <rect x="200" y="160" width="8" height="45" rx="2" fill="#8A7A5E" opacity="0.45"/>
  <rect x="392" y="160" width="8" height="45" rx="2" fill="#8A7A5E" opacity="0.45"/>

  <!-- Flower clusters left -->
  <g>
    <ellipse cx="155" cy="225" rx="22" ry="10" fill="#5A8A42" opacity="0.5"/>
    <g fill="#E0A0B8" opacity="0.6">
      <circle cx="145" cy="218" r="5"/>
      <circle cx="158" cy="215" r="5.5"/>
      <circle cx="170" cy="220" r="4.5"/>
    </g>
  </g>

  <!-- Flower clusters right -->
  <g>
    <ellipse cx="445" cy="235" rx="22" ry="10" fill="#5A8A42" opacity="0.5"/>
    <g fill="#F0D060" opacity="0.55">
      <circle cx="435" cy="228" r="4.5"/>
      <circle cx="448" cy="225" r="5"/>
      <circle cx="460" cy="230" r="4"/>
    </g>
  </g>

  <!-- More flowers down the path -->
  <g>
    <ellipse cx="140" cy="310" rx="18" ry="8" fill="#5A8A42" opacity="0.5"/>
    <g fill="#B8A0E0" opacity="0.5">
      <circle cx="132" cy="304" r="4"/>
      <circle cx="145" cy="302" r="4.5"/>
      <circle cx="155" cy="306" r="3.5"/>
    </g>
  </g>
  <g>
    <ellipse cx="460" cy="320" rx="18" ry="8" fill="#5A8A42" opacity="0.5"/>
    <g fill="#E8A0B0" opacity="0.5">
      <circle cx="452" cy="314" r="4"/>
      <circle cx="465" cy="312" r="4.5"/>
      <circle cx="475" cy="316" r="3.5"/>
    </g>
  </g>

  <!-- Decorative pot planters at path entrance -->
  <rect x="185" y="390" width="22" height="28" rx="4" fill="#C4B0A0"/>
  <ellipse cx="196" cy="382" rx="14" ry="16" fill="#5A8A42" opacity="0.6"/>
  <rect x="393" y="390" width="22" height="28" rx="4" fill="#C4B0A0"/>
  <ellipse cx="404" cy="382" rx="14" ry="16" fill="#5A8A42" opacity="0.6"/>
</svg>
