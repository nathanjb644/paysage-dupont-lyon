<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450">
  <defs>
    <linearGradient id="sky-grey" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a0a098"/>
      <stop offset="100%" stop-color="#b8b5a8"/>
    </linearGradient>
    <linearGradient id="dirt-ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a7d60"/>
      <stop offset="50%" stop-color="#7d7050"/>
      <stop offset="100%" stop-color="#706545"/>
    </linearGradient>
    <linearGradient id="hedge-old" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a5a35"/>
      <stop offset="100%" stop-color="#3d4d2a"/>
    </linearGradient>
    <filter id="grain3">
      <feTurbulence type="fractalNoise" baseFrequency="0.55" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.1"/>
      </feComponentTransfer>
      <feComposite in="SourceGraphic" operator="over"/>
    </filter>
  </defs>

  <!-- Sky overcast -->
  <rect width="600" height="180" fill="url(#sky-grey)"/>

  <!-- Overgrown hedge left (unkempt) -->
  <g fill="url(#hedge-old)" opacity="0.8">
    <ellipse cx="30" cy="170" rx="60" ry="50"/>
    <ellipse cx="80" cy="160" rx="50" ry="55"/>
    <ellipse cx="20" cy="150" rx="40" ry="40"/>
    <ellipse cx="60" cy="140" rx="35" ry="35"/>
    <!-- Random overgrown branches -->
    <ellipse cx="100" cy="130" rx="20" ry="25"/>
    <ellipse cx="10" cy="130" rx="25" ry="20"/>
  </g>

  <!-- Overgrown hedge right (unkempt) -->
  <g fill="url(#hedge-old)" opacity="0.8">
    <ellipse cx="570" cy="170" rx="60" ry="50"/>
    <ellipse cx="520" cy="160" rx="50" ry="55"/>
    <ellipse cx="580" cy="150" rx="40" ry="40"/>
    <ellipse cx="540" cy="140" rx="35" ry="35"/>
    <ellipse cx="500" cy="130" rx="20" ry="25"/>
    <ellipse cx="590" cy="130" rx="25" ry="20"/>
  </g>

  <!-- Sparse dead grass strip left -->
  <g fill="#6b7a45" opacity="0.4">
    <ellipse cx="120" cy="220" rx="80" ry="30"/>
    <ellipse cx="140" cy="250" rx="90" ry="25"/>
  </g>

  <!-- Sparse dead grass strip right -->
  <g fill="#6b7a45" opacity="0.4">
    <ellipse cx="480" cy="220" rx="80" ry="30"/>
    <ellipse cx="460" cy="250" rx="90" ry="25"/>
  </g>

  <!-- Dirt ground base -->
  <rect y="180" width="600" height="270" fill="url(#dirt-ground)"/>

  <!-- Dirt path (uneven, muddy) -->
  <path d="M220 180 Q230 250 240 300 Q250 350 260 400 Q265 430 270 450 L330 450 Q335 430 340 400 Q350 350 360 300 Q370 250 380 180Z" fill="#6b5d42" opacity="0.6"/>

  <!-- Puddles in dirt path -->
  <ellipse cx="295" cy="280" rx="35" ry="10" fill="#5a6a70" opacity="0.3"/>
  <ellipse cx="310" cy="350" rx="25" ry="8" fill="#5a6a70" opacity="0.25"/>
  <ellipse cx="285" cy="410" rx="30" ry="9" fill="#5a6a70" opacity="0.2"/>

  <!-- Gravel scattered -->
  <g fill="#8a8275" opacity="0.5">
    <circle cx="260" cy="230" r="3"/>
    <circle cx="340" cy="240" r="2.5"/>
    <circle cx="280" cy="260" r="3"/>
    <circle cx="320" cy="270" r="2"/>
    <circle cx="290" cy="310" r="3"/>
    <circle cx="330" cy="320" r="2.5"/>
    <circle cx="275" cy="360" r="2"/>
    <circle cx="315" cy="370" r="3"/>
    <circle cx="300" cy="390" r="2.5"/>
    <circle cx="270" cy="430" r="2"/>
    <circle cx="320" cy="420" r="3"/>
  </g>

  <!-- Weeds growing through dirt -->
  <g fill="#5a6b35" opacity="0.5">
    <path d="M250 300 Q247 280 250 260 Q253 280 256 300Z"/>
    <path d="M350 340 Q347 320 350 300 Q353 320 356 340Z"/>
    <path d="M270 380 Q267 360 270 342 Q273 360 276 380Z"/>
    <path d="M330 400 Q327 382 330 365 Q333 382 336 400Z"/>
  </g>

  <!-- Dandelions -->
  <g fill="#c8c060" opacity="0.4">
    <circle cx="250" cy="258" r="4"/>
    <circle cx="350" cy="298" r="3.5"/>
    <circle cx="270" cy="340" r="4"/>
  </g>

  <!-- Old broken border stones -->
  <g fill="#7a7568" opacity="0.5">
    <rect x="215" y="195" width="18" height="12" rx="3" transform="rotate(5 224 201)"/>
    <rect x="218" y="230" width="16" height="11" rx="3" transform="rotate(-8 226 235)"/>
    <rect x="370" y="200" width="18" height="12" rx="3" transform="rotate(-3 379 206)"/>
    <rect x="365" y="250" width="16" height="11" rx="3" transform="rotate(10 373 255)"/>
  </g>

  <!-- Tire track marks -->
  <g stroke="#5e5238" stroke-width="3" fill="none" opacity="0.2">
    <path d="M275 180 Q280 250 285 350 Q288 400 290 450"/>
    <path d="M310 180 Q315 250 320 350 Q323 400 325 450"/>
  </g>

  <!-- Grain overlay -->
  <rect width="600" height="450" fill="transparent" filter="url(#grain3)"/>
</svg>