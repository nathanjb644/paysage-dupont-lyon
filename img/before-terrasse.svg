<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450">
  <defs>
    <linearGradient id="wall-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a09888"/>
      <stop offset="100%" stop-color="#8a8275"/>
    </linearGradient>
    <linearGradient id="old-concrete" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#908a7e"/>
      <stop offset="30%" stop-color="#858070"/>
      <stop offset="100%" stop-color="#7a7565"/>
    </linearGradient>
    <linearGradient id="old-wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6b5d42"/>
      <stop offset="100%" stop-color="#5a4e3a"/>
    </linearGradient>
    <filter id="grain2">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.1"/>
      </feComponentTransfer>
      <feComposite in="SourceGraphic" operator="over"/>
    </filter>
  </defs>

  <!-- Wall background stained -->
  <rect width="600" height="200" fill="url(#wall-bg)"/>

  <!-- Wall stains -->
  <ellipse cx="150" cy="80" rx="60" ry="40" fill="#7a7265" opacity="0.3"/>
  <ellipse cx="450" cy="120" rx="80" ry="50" fill="#6d6558" opacity="0.25"/>
  <ellipse cx="300" cy="150" rx="100" ry="30" fill="#6d6558" opacity="0.2"/>

  <!-- Window old -->
  <rect x="230" y="30" width="140" height="120" rx="3" fill="#5a6a70" opacity="0.6" stroke="#6b5d42" stroke-width="4"/>
  <line x1="300" y1="30" x2="300" y2="150" stroke="#6b5d42" stroke-width="3"/>
  <line x1="230" y1="90" x2="370" y2="90" stroke="#6b5d42" stroke-width="3"/>

  <!-- Old concrete floor -->
  <rect y="200" width="600" height="250" fill="url(#old-concrete)"/>

  <!-- Cracks in concrete -->
  <g stroke="#6b6555" stroke-width="1.5" fill="none" opacity="0.6">
    <path d="M100 250 Q120 270 110 300 Q130 320 120 360 Q140 380 130 420"/>
    <path d="M110 300 Q150 305 180 290"/>
    <path d="M350 220 Q360 260 340 300 Q355 330 345 370"/>
    <path d="M340 300 Q380 310 420 295"/>
    <path d="M500 240 Q510 280 490 320 Q505 350 495 400"/>
  </g>

  <!-- Old wooden planks (remnants of old deck) -->
  <g fill="url(#old-wood)" opacity="0.7">
    <rect x="20" y="200" width="180" height="22" rx="2"/>
    <rect x="20" y="226" width="180" height="22" rx="2"/>
    <rect x="20" y="252" width="140" height="22" rx="2"/>
    <!-- Wood grain lines -->
    <line x1="30" y1="208" x2="190" y2="210" stroke="#4d4232" stroke-width="0.5" opacity="0.5"/>
    <line x1="30" y1="234" x2="190" y2="236" stroke="#4d4232" stroke-width="0.5" opacity="0.5"/>
  </g>

  <!-- Broken plank -->
  <rect x="160" y="252" width="50" height="22" fill="#5a4e3a" opacity="0.5" rx="2" transform="rotate(8 185 263)"/>

  <!-- Moss/algae patches -->
  <g fill="#5a6b45" opacity="0.3">
    <ellipse cx="300" cy="380" rx="50" ry="20"/>
    <ellipse cx="450" cy="350" rx="40" ry="15"/>
    <ellipse cx="100" cy="400" rx="60" ry="18"/>
  </g>

  <!-- Weeds growing through cracks -->
  <g fill="#6b7a45" opacity="0.5">
    <path d="M108 298 Q105 280 108 265 Q110 280 112 298Z"/>
    <path d="M340 298 Q337 278 340 260 Q343 278 346 298Z"/>
    <path d="M494 318 Q491 298 494 280 Q497 298 500 318Z"/>
  </g>

  <!-- Old rusty drain -->
  <circle cx="480" cy="420" r="15" fill="#5a5248" stroke="#4a4238" stroke-width="2"/>
  <circle cx="480" cy="420" r="8" fill="#3a3530"/>
  <line x1="474" y1="414" x2="486" y2="426" stroke="#4a4238" stroke-width="1.5"/>
  <line x1="486" y1="414" x2="474" y2="426" stroke="#4a4238" stroke-width="1.5"/>

  <!-- Scattered leaves -->
  <g fill="#7a6c4f" opacity="0.4">
    <ellipse cx="350" cy="260" rx="8" ry="4" transform="rotate(30 350 260)"/>
    <ellipse cx="250" cy="350" rx="7" ry="3" transform="rotate(-15 250 350)"/>
    <ellipse cx="420" cy="300" rx="6" ry="3" transform="rotate(45 420 300)"/>
    <ellipse cx="180" cy="380" rx="7" ry="4" transform="rotate(-30 180 380)"/>
  </g>

  <!-- Old plastic chair (abandoned) -->
  <g fill="#7a7568" opacity="0.5" transform="translate(430,220)">
    <rect x="0" y="20" width="50" height="5" rx="2"/>
    <rect x="5" y="25" width="5" height="40" rx="1"/>
    <rect x="40" y="25" width="5" height="40" rx="1"/>
    <rect x="0" y="0" width="50" height="22" rx="3" fill="#6d6860"/>
    <rect x="-2" y="-30" width="54" height="32" rx="3" fill="#6d6860" transform="rotate(-5 25 -14)"/>
  </g>

  <!-- Grain overlay -->
  <rect width="600" height="450" fill="transparent" filter="url(#grain2)"/>
</svg>