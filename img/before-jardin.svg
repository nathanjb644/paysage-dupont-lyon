<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450">
  <defs>
    <linearGradient id="sky-before" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9a9a8e"/>
      <stop offset="100%" stop-color="#b5b3a4"/>
    </linearGradient>
    <linearGradient id="ground-bare" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b7d5e"/>
      <stop offset="40%" stop-color="#7a6c4f"/>
      <stop offset="100%" stop-color="#6b5d42"/>
    </linearGradient>
    <linearGradient id="mud-patch" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5e5238"/>
      <stop offset="100%" stop-color="#6d6044"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.12"/>
      </feComponentTransfer>
      <feComposite in="SourceGraphic" operator="over"/>
    </filter>
  </defs>

  <!-- Sky overcast -->
  <rect width="600" height="220" fill="url(#sky-before)"/>

  <!-- Fence old/broken -->
  <g opacity="0.7">
    <rect x="0" y="140" width="8" height="80" fill="#5a4e3a" rx="1" transform="rotate(-3 4 180)"/>
    <rect x="70" y="135" width="8" height="85" fill="#5a4e3a" rx="1"/>
    <rect x="140" y="142" width="8" height="78" fill="#5a4e3a" rx="1" transform="rotate(2 144 180)"/>
    <rect x="210" y="138" width="8" height="82" fill="#5a4e3a" rx="1" transform="rotate(-1 214 180)"/>
    <rect x="280" y="145" width="8" height="75" fill="#5a4e3a" rx="1" transform="rotate(4 284 180)"/>
    <rect x="350" y="136" width="8" height="84" fill="#5a4e3a" rx="1"/>
    <rect x="420" y="143" width="8" height="77" fill="#5a4e3a" rx="1" transform="rotate(-2 424 180)"/>
    <rect x="490" y="139" width="8" height="81" fill="#5a4e3a" rx="1" transform="rotate(1 494 180)"/>
    <rect x="560" y="141" width="8" height="79" fill="#5a4e3a" rx="1" transform="rotate(-3 564 180)"/>
    <!-- Horizontal rails (broken) -->
    <rect x="0" y="160" width="290" height="5" fill="#4d4232" rx="1"/>
    <rect x="310" y="162" width="290" height="5" fill="#4d4232" rx="1"/>
    <rect x="0" y="190" width="220" height="5" fill="#4d4232" rx="1"/>
    <rect x="240" y="188" width="360" height="5" fill="#4d4232" rx="1"/>
  </g>

  <!-- Ground bare earth -->
  <rect y="220" width="600" height="230" fill="url(#ground-bare)"/>

  <!-- Mud patches -->
  <ellipse cx="150" cy="300" rx="80" ry="25" fill="url(#mud-patch)" opacity="0.6"/>
  <ellipse cx="420" cy="340" rx="100" ry="30" fill="url(#mud-patch)" opacity="0.5"/>
  <ellipse cx="300" cy="380" rx="120" ry="35" fill="#5e5238" opacity="0.4"/>

  <!-- Dead grass patches -->
  <g fill="#8a7f5a" opacity="0.6">
    <path d="M50 280 Q52 260 55 280 Q57 260 60 280 Q62 265 65 280Z"/>
    <path d="M180 350 Q182 330 185 350 Q187 335 190 350Z"/>
    <path d="M500 300 Q502 280 505 300 Q507 285 510 300 Q512 282 515 300Z"/>
    <path d="M340 260 Q342 240 345 260 Q347 245 350 260Z"/>
    <path d="M80 380 Q82 360 85 380 Q87 365 90 380 Q92 362 95 380Z"/>
    <path d="M450 390 Q452 370 455 390 Q457 375 460 390Z"/>
    <path d="M250 420 Q252 400 255 420 Q257 405 260 420Z"/>
  </g>

  <!-- Weeds -->
  <g stroke="#6b7a45" stroke-width="2" fill="none" opacity="0.7">
    <path d="M100 310 Q95 285 100 260"/>
    <path d="M103 310 Q108 280 105 255"/>
    <path d="M360 290 Q355 265 360 240"/>
    <path d="M363 290 Q368 260 365 238"/>
    <path d="M530 360 Q525 335 530 310"/>
    <path d="M533 360 Q538 330 535 308"/>
  </g>

  <!-- Dandelions/weeds with heads -->
  <g fill="#b8b060" opacity="0.5">
    <circle cx="100" cy="258" r="5"/>
    <circle cx="360" cy="238" r="4"/>
    <circle cx="530" cy="308" r="5"/>
  </g>

  <!-- Scattered debris -->
  <rect x="200" y="330" width="25" height="8" fill="#4a4030" rx="2" transform="rotate(15 212 334)" opacity="0.4"/>
  <rect x="400" y="280" width="20" height="6" fill="#4a4030" rx="2" transform="rotate(-20 410 283)" opacity="0.35"/>

  <!-- Old tree stump -->
  <ellipse cx="520" cy="260" rx="20" ry="15" fill="#5a4e3a"/>
  <ellipse cx="520" cy="255" rx="17" ry="12" fill="#6b5d42"/>
  <circle cx="520" cy="253" r="6" fill="#4d4232" opacity="0.4"/>

  <!-- Grain overlay for photo realism -->
  <rect width="600" height="450" fill="transparent" filter="url(#grain)"/>
</svg>